<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button
        :style="style1"
        @mouseover.stop="overEvent"
        :style="style2"
        @mouseout.stop="outEvent"
      >
        테스트
      </button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            overEvent: { backgroundColor: 'aqua', color: 'black' },
            outEvent: { backgroundColor: 'aqua', color: 'black' },
          };
        },
        methods: {
          overEvent() {
            this.style1.backgroundColor = 'purple';
            this.style1.color = 'yellow';
          },
          outEvent() {
            this.style2.backgroundColor = 'auqa';
            this.style2.color = 'black';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
