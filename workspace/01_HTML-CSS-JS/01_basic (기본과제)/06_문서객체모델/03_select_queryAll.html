<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 이벤트를 연결 => 문서가 다 로드 되고 나면 function을 실행해라.
      window.onload = function () {
        // 문서 객체 선택
        let zs = document.querySelectorAll('h1'); // document - 우리가 작성한 브라우저 워크스페이스
        // 요소를 여러 개 접근하는 경우 [배열] 형태로 반환됨
        // -> 배열 내의 요소에 css, 이벤트 등을 적용하고 싶으면
        //    인덱스 번호를 이용하여 요소 하나에 직접 적용해야 한다.

        for (let i = 0; i < zs.length; i++) {
          // 변수를 선언
          let z = zs[i];
          // 문서 객체를 조작
          z.style.color = 'orange';
          z.style.backgroundColor = 'red';
          z.innerHTML = 'From JavaScript';
        }
      };
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
