<!-- (1) 단순텍스트 출력
     (2) HTML 태그가 적용되도록 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 이벤트를 연결
      window.onload = function () {
        // 변수를 선언
        let output = '';
        for (let i = 0; i < 10; i++) {
          output += `<h1>Header - ` + i + ` <h1>`;
        }
        // 문서 객체 내부의 글자를 변경
        document.body.textContent = output;
        // innerHTML 속성을 사용
        // document.body.innerHTML = output; ----> 위에꺼 실행 후 주석 풀고 실행하기
      };
    </script>
  </head>
