<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>if - else if - else</h3>
    <pre>
        if( 조건식1 ) {
          조건식1이 true일 때 수행할 코드
        <!-- 여기서 조건식1이 true이면 여기서 동작을 멈추고
             수행할 코드를 진행. False면 else if로 조건식2 확인  -->
        } else if ( 조건식2 ) {
          조건식1이 false이면서
          조건식2가 true일 때
        <!-- 여기서 조건식2이 true이면 여기서 동작을 멈추고
             수행할 코드를 진행. False면 else로 조건식3 확인  -->        
        } else {
          위의 조건식들을 모두 만족하지 않는 경우
          수행할 코드를 작성하면 된다.
        }
    </pre>

    <script>
      let date = new Date();
      let month = date.getMonth() + 1; // 그냥 date.getMonth(); 를 하게 되면 현재는 3월인데, 2로 출력되기 때문에, +1을 붙여야한다.

      console.log(month);
      month = 15;
      console.log(month);
      if (3 <= month && month <= 5) {
        // && (and 연산자, 조건식이 둘다 true일 때만 작동시킴)를 사용해서 3월과 5월 사이에 month가 봄일 경우 출력하도록 유도한다.
        // 3 ~ 5월 : 봄
        alert('봄 입니다~');
      } else if (6 <= month && month <= 8) {
        // 6 ~ 8월 : 여름
        alert('여름입니다 ㅠ');
      } else if (9 <= month && month <= 11) {
        // 9 ~ 11월 : 가을
        alert('가을입니다~');
      } else if (month == 12 || month == 1 || month == 2) {
        // 12, 1, 2월 : 겨울
        alert('겨울입니다 ㄷㄷ');
      } else {
        alert('!잘못된 월 입니다!');
      }
      // else if 구문에서 마지막 else를 안쓰더라도 코드는 수행된다.
      // == : 같다
      // =  : 대입연산자
      // || (or) : 조건식이 하나라도 true라면 수행
    </script>
  </body>
</html>
