<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>객체 object</title>
  </head>
  <body>
    <h3>자바스크립트 객체</h3>
    <pre>
        자바스크립트의 객체는 {}중괄호 내에 
        Key:Value가 모여있는 형태로 작성된다.

        { K:V, K:V, K:V } <!-- 이것이 자바스크립트 내의 객체이다.-->
    </pre>
    <script>
      // 객체 선언
      let product = {
        // 객체도 변수에 담아 둘 수 있다.
        제품명: '7D 건조 망고',
        유형: '당절임',
        성분: '망고, 설탕, 메타중아황산나트륨, 치자황색소',
        원산지: '필리핀',
      };

      /* 자바스크립트 객체의 key값은 " " , ' '를
         생략하여도 문자열로 인식한다.
         단, Value값은 문자열인 경우 " " , ' ' 를
         필수로 작성해야만 한다! */

      // 변수명.Key : Value 출력
      console.log(product.제품명); // 이렇게 하면  7D 건조 망고가 나온다,

      // 반복문을 이용하여 value 출력 ==> 객체 전용 for문이 있음
      // for ( 변수 in 객체명){ }
      for (let i in product) {
        console.log(i);
        console.log(product[i]); // 반복문 안에서 꺼낼때는 이런 형태로 (product[i]) 로 해야한다.

        // alert(i + ' : ' + product[i]);
        alert(`${i} :${product[i]}`);
        // Template literals (템플릿 리터럴)
        // -> ``(백틱)을 사용하여 문자열을 표현하는 방식
      }
    </script>
  </body>
</html>
