<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 - while</title>
  </head>
  <body>
    <h3>while문</h3>
    <pre>
        작성법
        while( 조건식 ) {
          반복 수행할 코드 작성 ;
        }
    </pre>

    <script>
      let i = 0; // 변수 선언 및 초기화
      let array = [10, 20, 30, 40, 50];

      while (i < array.length) {
        // 반복횟수는 array.length로 array의 반복만큼 지정한다.
        alert(array[i]);
        // 배열명[인덱스번호] : 배열에 담긴 값 하나씩 꺼낼 수 있다.
      }

      // i 값 1 증가 => i++ : 코드 수행 후, i 값 1 증가
      // ++i => i값 1 증가 후 코드 수행
    </script>
  </body>
</html>
