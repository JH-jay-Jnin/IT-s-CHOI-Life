<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const name = '최진휘';
      // 문자열 리터럴 표기법 : '' , " "

      // 객체는 속성과 기능을 가진다.
      let person = {
        name: '박지훈',
        eat: function (bread) {
          console.log(name); // 최진휘
          // -> 객체 외부 변수 호출

          /* 같은 객체 내부의 다른 속성을 호출하고 싶은 경우
             현재 객체를 뜻하는  this를 써야한다. */
          alert(this.name + '이' + bread + '을 먹는다.');
        },
      };

      console.log(person.name); // 객체 안에 있는 속성을 꺼낼 때는 항상 객체명.속성 으로 써야한다.
      console.log(person.eat('빵'));
      // 함수 호출 : 함수명() ;
      // 따라서, 함수명만 작성하면 함수 자체를 반환한다. ( 호출X )
    </script>
  </body>
</html>
