<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        margin-top: 50px;
        margin-left: 50px;
        height: 1000px;
      }
      .top_bar {
        background: red;
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        height: 50px;
      }
      .left_bar {
        background: blue;
        position: fixed;
        left: 0;
        top: 50px;
        bottom: 0;
        width: 50px;
      }
      #text {
        width: 200px;
        height: 200px;
        background-color: yellow;

        position: fixed;
        /* 원하는 위치에 고정하고 싶을 때 쓰는데,
            보통 left rihgt top bottom을 같이 씀 */
        /* 스크롤 내려도 계속 고정된다. */
        /* 그러나 absolute는 움직인다. */
        right: 20px;
        bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="top_bar"></div>
    <div class="left_bar"></div>
    <div class="container">
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. …</p>
      <p>Proin ut quam feugiat, tincidunt dolor nec, iaculis dui. ….</p>
      <p>Fusce elementum pretium diam vitae facilisis. ….</p>
      <p>Mauris non lobortis lectus. V….</p>
    </div>
    <div id="text">text</div>
  </body>
</html>
